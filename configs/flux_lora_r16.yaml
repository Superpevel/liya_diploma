job: extension
config:
  name: flux_logo_lora_r16
  process:
    - type: sd_trainer
      training_folder: "/content/drive/MyDrive/liya_diplomCC/results/experiments/flux_r16"
      device: cuda:0
      trigger_word: "LOGOIMG"
      network:
        type: lora
        linear: 16
        linear_alpha: 16
      save:
        dtype: float16
        save_every: 500
        max_step_saves_to_keep: 4
      datasets:
        - folder_path: "/content/drive/MyDrive/liya_diplomCC/data/train_images"
          caption_ext: txt
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [512, 512]
      train:
        batch_size: 1
        steps: 4000
        gradient_accumulation_steps: 2
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: flowmatch
        optimizer: adamw8bit
        lr: 1e-4
        lr_scheduler: cosine_with_restarts
        ema_config:
          use_ema: true
          ema_decay: 0.99
        dtype: bf16
      model:
        name_or_path: "black-forest-labs/FLUX.1-dev"
        is_flux: true
        quantize: true
      sample:
        sampler: flowmatch
        sample_every: 500
        width: 512
        height: 512
        prompts:
          - "LOGOIMG minimalist coffee shop logo, circular, dark green, flat design"
          - "LOGOIMG tech startup logo, geometric hexagon, blue gradient, sans-serif"
        neg: ""
        seed: 42
        walk_seed: true
        guidance_scale: 3.5
        sample_steps: 20
meta:
  name: "flux_logo_lora_r16"
  version: "1.0"
